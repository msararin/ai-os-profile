name: Deployment Preflight

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  preflight:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify pnpm version
        run: |
          EXPECTED_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1]")
          ACTUAL_VERSION=$(pnpm --version)
          if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "❌ pnpm version mismatch: expected $EXPECTED_VERSION, got $ACTUAL_VERSION"
            exit 1
          fi
          echo "✅ pnpm version $ACTUAL_VERSION matches package.json"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Public dashboard leakage check
        run: pnpm check:public-dashboard-leakage
